<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Everyday Life Simulator</title>
    <link data-trunk rel="copy-dir" href="assets" />
    <link data-trunk rel="rust" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #111827;
        color: #e5e7eb;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #bevy {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
      }

      .hint {
        position: absolute;
        left: 12px;
        top: 12px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(17, 24, 39, 0.78);
        font-size: 13px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="bevy"></canvas>
      <div class="hint">Click the game once if your browser blocks audio autoplay.</div>
    </div>
  </body>
</html>
