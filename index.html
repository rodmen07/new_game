<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Everyday Life Simulator</title>
    <link data-trunk rel="copy-dir" href="assets" />
    <link data-trunk rel="rust" />
    <script>
      (function () {
        let started = !!window.wasmBindings;
        let startupPollId = null;

        function markStarted() {
          started = true;
          if (startupPollId !== null) {
            clearInterval(startupPollId);
            startupPollId = null;
          }
          const overlay = document.getElementById("startup-diagnostics");
          if (overlay) {
            overlay.style.display = "none";
          }
        }

        function ensureOverlay() {
          let overlay = document.getElementById("startup-diagnostics");
          if (!overlay) {
            overlay = document.createElement("div");
            overlay.id = "startup-diagnostics";
            overlay.className = "startup-diagnostics";
            document.body.appendChild(overlay);
          }
          return overlay;
        }

        function showDiagnostic(message) {
          const overlay = ensureOverlay();
          overlay.textContent = message;
          overlay.style.display = "block";
        }

        window.addEventListener("TrunkApplicationStarted", function () {
          markStarted();
        });

        // Trunk can dispatch the startup event before this script runs.
        // Polling window.wasmBindings covers that ordering race.
        startupPollId = setInterval(function () {
          if (window.wasmBindings) {
            markStarted();
          }
        }, 250);

        window.addEventListener("error", function (event) {
          const detail = event && event.message ? event.message : "Unknown runtime error";
          showDiagnostic("Startup error: " + detail);
        });

        window.addEventListener("unhandledrejection", function (event) {
          const reason = event && event.reason ? String(event.reason) : "Unknown promise rejection";
          showDiagnostic("Startup rejected: " + reason);
        });

        setTimeout(function () {
          if (!started) {
            showDiagnostic(
              "Game startup is taking too long. Check browser console for JS/WASM errors, disable aggressive blockers, and hard-refresh."
            );
          }
        }, 45000);
      })();
    </script>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #111827;
        color: #e5e7eb;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #bevy {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
      }

      .hint {
        position: absolute;
        left: 12px;
        top: 12px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(17, 24, 39, 0.78);
        font-size: 13px;
        pointer-events: none;
      }

      .startup-diagnostics {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid rgba(248, 113, 113, 0.6);
        background: rgba(127, 29, 29, 0.88);
        color: #fee2e2;
        font-size: 13px;
        line-height: 1.4;
        display: none;
        z-index: 50;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="bevy"></canvas>
      <div class="hint">Click the game once if your browser blocks audio autoplay.</div>
    </div>
  </body>
</html>
